Read the relevant feature documentation, architecture notes, existing code, and recorded prior decisions before planning. Follow AGENTS.md, docs/architecture/fullstack-garage-architecture.md, and DESIGN.md when UI is involved. Break the feature into small, concrete implementation tasks; make dependencies and ordering explicit, distinguish parallel work from sequential work, and define a validation step for every task. Surface assumptions, risks, migrations, security concerns, and unresolved decisions. Do not edit production code. Produce or update the appropriate task breakdown document, preserving useful existing content and keeping it actionable for implementation.
